global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: arcane-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-server:8080
        labels:
          application: Arcane
          service: api

  - job_name: arcane-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - worker-server:7749
        labels:
          application: Arcane
          service: worker

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
