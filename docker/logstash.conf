input {
  file {
    path => [
      "/usr/share/logstash/logs/api/*.log",
      "/usr/share/logstash/logs/worker/*.log"
    ]
    start_position => "beginning"
    sincedb_path => "/dev/null"
    stat_interval => "1 second"
  }
}

filter {
  grok {
    match => {
      "message" => "^%{TIMESTAMP_ISO8601:log_time}\s+%{LOGLEVEL:level}\s+\[(?<application>[^\]]+)\]\s+trace=%{DATA:traceId}\s+\[(?<thread>[^\]]+)\]\s+%{DATA:logger}\s+\|\s+%{GREEDYDATA:log_message}$"
    }
    tag_on_failure => ["_arcane_grok_failure"]
  }

  date {
    match => ["log_time", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
    timezone => "Asia/Seoul"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "arcane-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
