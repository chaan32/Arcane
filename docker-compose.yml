name: arcane

services:
  arcane-db:
    image: mysql:8.0
    container_name: arcane-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-arcane1234}
      MYSQL_DATABASE: arcane_db
    ports:
      - "3307:3306"
    volumes:
      - arcane-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${SPRING_DATASOURCE_PASSWORD:-arcane1234}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: arcane-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - arcane-redis-data:/data

  kafka:
    image: apache/kafka:3.7.2
    hostname: kafka
    container_name: arcane-kafka
    restart: unless-stopped
    user: "0:0"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data

  mongodb:
    image: mongo:7
    container_name: arcane-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - arcane-mongo-data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.0
    container_name: elasticsearch-test
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:9.1.0
    container_name: logstash-test
    restart: unless-stopped
    ports:
      - "5044:5044"
    volumes:
      - ./docker/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./backend/Arcane_Backend/logs:/usr/share/logstash/logs/api:ro
      - ./worker/logs:/usr/share/logstash/logs/worker:ro
    depends_on:
      elasticsearch:
        condition: service_started

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.0
    container_name: kibana-test
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
      TELEMETRY_ENABLED: "false"
    depends_on:
      elasticsearch:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus-test
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      api-server:
        condition: service_started

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana-test
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./backend/Arcane_Backend/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./backend/Arcane_Backend/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      elasticsearch:
        condition: service_started

  ai-server:
    build:
      context: ./ai/Arcane_AI
    image: arcane-ai:local
    container_name: arcane-ai
    restart: unless-stopped
    ports:
      - "8864:8864"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      AI_KAFKA_ENABLED: "true"
      AI_SCORE_REQUEST_TOPIC: arcane.ai.score.requested
      AI_SCORE_COMPLETED_TOPIC: arcane.ai.score.completed
      AI_SCORE_FAILED_TOPIC: arcane.ai.score.failed
      ARCANE_DB_HOST: arcane-db
      ARCANE_DB_PORT: 3306
      ARCANE_DB_NAME: arcane_db
      ARCANE_DB_USER: ${SPRING_DATASOURCE_USERNAME:-root}
      ARCANE_DB_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-arcane1234}
    depends_on:
      arcane-db:
        condition: service_healthy
      kafka:
        condition: service_started

  api-server:
    build:
      context: ./backend/Arcane_Backend
    image: arcane-api:local
    container_name: arcane-api
    restart: unless-stopped
    env_file:
      - ./backend/Arcane_Backend/.env
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://arcane-db:3306/arcane_db?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/arcane_match
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      MODELING_PYTHON_URL: http://ai-server:8864
      ELASTICSEARCH_URL: http://elasticsearch:9200
      OAUTH2_SUCCESS_REDIRECT_URI: http://localhost:3000/oauth/callback
      OAUTH2_FAILURE_REDIRECT_URI: http://localhost:3000/oauth/callback
    volumes:
      - ./backend/Arcane_Backend/logs:/app/logs
    depends_on:
      arcane-db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      mongodb:
        condition: service_started
      elasticsearch:
        condition: service_started
      ai-server:
        condition: service_started

  worker-server:
    build:
      context: ./worker
    image: arcane-worker:local
    container_name: arcane-worker
    restart: unless-stopped
    env_file:
      - ./worker/.env
    ports:
      - "7749:7749"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://arcane-db:3306/arcane_db?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/arcane_match
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    volumes:
      - ./worker/logs:/app/logs
    depends_on:
      arcane-db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      mongodb:
        condition: service_started

  frontend:
    build:
      context: ./frontend/Arcane_Frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_DDRAGON_VERSION: ${NEXT_PUBLIC_DDRAGON_VERSION:-16.11.1}
    image: arcane-frontend:local
    container_name: arcane-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api-server:
        condition: service_started

volumes:
  arcane-db-data:
    name: backend_arcane-db-data
  arcane-mongo-data:
    name: arcane_backend_arcane-mongo-data
  arcane-redis-data:
    name: arcane_backend_arcane-redis-data
  elasticsearch-data:
    name: arcane_backend_elasticsearch-data
  kafka-data:
    name: arcane_backend_kafka-data
  prometheus-data:
    name: arcane_backend_prometheus-data
  grafana-data:
    name: arcane_backend_grafana-data
