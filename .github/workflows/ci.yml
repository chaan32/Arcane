name: Arcane CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/Arcane_Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Compile backend
        run: |
          chmod +x ./gradlew
          ./gradlew compileJava -x test --no-daemon

  worker:
    name: Worker Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Compile worker
        run: |
          chmod +x ./gradlew
          ./gradlew compileJava -x test --no-daemon

  frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/Arcane_Frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_DDRAGON_VERSION: latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/Arcane_Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  ai:
    name: AI Server Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai/Arcane_AI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall main.py arcane_model arcane_dataset

      - name: Import FastAPI app
        env:
          AI_KAFKA_ENABLED: "false"
        run: python -c "import main; print(main.health())"

  compose:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate EC2 compose file
        run: docker compose --env-file .env.ec2.example -f docker-compose.ec2.yml config
