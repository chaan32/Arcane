spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: Arcane

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: arcane-api-server
      auto-offset-reset: latest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

  datasource :
    url: ${SPRING_DATASOURCE_URL}
    username : ${SPRING_DATASOURCE_USERNAME}
    password : ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa :
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:20MB}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            client-name: Google
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile

          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-name: Naver
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  address: 0.0.0.0
  port : 8080

jwt:
  secret: ${JWT_SECRET}
  expiration : ${JWT_EXPIRATION}
  password : ${JWT_PASSWORD}

riot:
  # 이게 진짜임
  api-key: ${RIOT_API_KEY}

  patch-version : ${RIOT_PATCH_VERSION}
  season2024-1 : 1704844800
  season2024-2 : 1715731200
  season2025-1 : 1736434800
  season2025-2 : 1746019200
  season2025-3 : 1756281600

modeling:
  python-url: ${MODELING_PYTHON_URL}
  transport: ${MODELING_TRANSPORT:http}
  kafka-timeout-ms: ${MODELING_KAFKA_TIMEOUT_MS:3000}

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000}
  oauth2:
    redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: Arcane
  endpoint:
    health:
      show-details: always


arcane:
  storage:
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_REGION:ap-northeast-2}
      public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
      guide-image-prefix: ${AWS_S3_GUIDE_IMAGE_PREFIX:guides}
      max-file-size-bytes: ${AWS_S3_GUIDE_IMAGE_MAX_BYTES:5242880}
  elasticsearch:
    url: ${ELASTICSEARCH_URL:http://localhost:9200}
    guide-index: ${GUIDE_SEARCH_INDEX:arcane_guide_posts}
    summoner-index: ${SUMMONER_SEARCH_INDEX:arcane_summoners}
  kafka:
    topics:
      ranking-update-requested: arcane.ranking.update.requested
      ranking-update-completed: arcane.ranking.update.completed
      ranking-update-failed: arcane.ranking.update.failed
      ranking-update-dlt: arcane.ranking.update.dlt

      dataset-collect-requested: arcane.dataset.collect.requested
      dataset-collect-completed: arcane.dataset.collect.completed
      dataset-collect-failed: arcane.dataset.collect.failed
      dataset-collect-dlt: arcane.dataset.collect.dlt

      champion-analysis-requested: arcane.champion.analysis.requested
      champion-analysis-progress: arcane.champion.analysis.progress
      champion-analysis-completed: arcane.champion.analysis.completed
      champion-analysis-failed: arcane.champion.analysis.failed
      champion-analysis-dlt: arcane.champion.analysis.dlt

      ai-score-requested: arcane.ai.score.requested
      ai-score-completed: arcane.ai.score.completed
      ai-score-failed: arcane.ai.score.failed
