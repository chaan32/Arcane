# 실행하려는 서비스(컨테이너)들의 목록
services:
  # 1. MySQL 데이터베이스 서비스 정의
  arcane-db:
    image: mysql:8.0
    container_name: arcane-db
    environment:
      - MYSQL_ROOT_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - MYSQL_DATABASE=arcane_db
    ports:
      - "3307:3306"
    # Docker를 종료해도 데이터가 유지되도록 볼륨 설정
    volumes:
      - arcane-db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost", "-p${SPRING_DATASOURCE_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis 서비스
  redis:
    image: redis:alpine
    container_name: arcane-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - arcane-redis-data:/data
    restart: always

  # 3. Kafka 서비스
  kafka:
    image: apache/kafka:3.7.2
    hostname: kafka
    container_name: arcane-kafka
    user: "0:0"
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: always

  # 4. MongoDB 서비스: Riot match 원본 JSON 저장소
  mongodb:
    image: mongo:7
    container_name: arcane-mongo
    ports:
      - "27017:27017"
    volumes:
      - arcane-mongo-data:/data/db
    restart: always

  # 5. Elasticsearch 서비스
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.0
    container_name: elasticsearch-test
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  # 6. Logstash 서비스
  logstash:
    image: docker.elastic.co/logstash/logstash:9.1.0
    container_name: logstash-test
    volumes:
      - ./logs:/usr/share/logstash/logs:ro
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  # 7. Kibana 서비스: Elasticsearch에 저장된 로그를 검색/시각화하는 UI
  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.0
    container_name: kibana-test
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
      TELEMETRY_ENABLED: "false"
    depends_on:
      - elasticsearch

  # 8. Prometheus 서비스: Spring Actuator의 /actuator/prometheus 메트릭을 주기적으로 수집
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus-test
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 9. Grafana 서비스: Prometheus 메트릭을 대시보드로 시각화
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana-test
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - elasticsearch

  # 앱 컨테이너는 기본 실행에서 제외한다.
  # 필요할 때만 `docker compose --profile app up -d arcane-app`으로 실행한다.
  arcane-app:
    profiles:
      - app
    build: .
    container_name: arcane-app
    env_file:
      - .env
    depends_on:
      arcane-db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      mongodb:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://arcane-db:3306/arcane_db
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/arcane_match
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092

# Docker 볼륨 정의
volumes:
  arcane-db-data:
    external: true
    name: backend_arcane-db-data
  elasticsearch-data:
  arcane-mongo-data:
  arcane-redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
