global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot를 IntelliJ/로컬에서 실행하고 Prometheus만 Docker로 실행하는 구조 기준이다.
  # 전체 서비스를 Docker Compose로 실행할 때는 루트의 docker/prometheus.yml을 사용한다.
  - job_name: arcane-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          application: Arcane
          service: api

  - job_name: arcane-worker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:7749
        labels:
          application: Arcane
          service: worker

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
